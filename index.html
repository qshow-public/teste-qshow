<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News - Uma Festa Todo Dia!</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #E50914; 
            --bg-dark: #141414;
            --card-bg: #1f1f1f;
            --text-light: #ffffff;
            --text-gray: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }

        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area h1 { color: var(--primary); font-size: 2.2rem; letter-spacing: 2px; }
        .logo-area span { font-size: 0.8rem; color: #fff; text-transform: uppercase; display: block; margin-top: -5px; }

        .player-container {
            background: var(--primary);
            padding: 8px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }
        audio { height: 25px; width: 130px; }

        .hero {
            height: 55vh;
            background: linear-gradient(rgba(0,0,0,0.4), var(--bg-dark)), 
                        url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5%;
        }
        .hero p { color: var(--primary); font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        .hero h2 { font-size: 3rem; max-width: 700px; line-height: 1.1; margin-top: 10px; }

        .container { padding: 40px 5%; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            font-size: 1.6rem;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .news-card:hover { transform: translateY(-8px); border-bottom: 3px solid var(--primary); }
        
        .img-box { width: 100%; height: 200px; background: #222; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .news-card:hover img { transform: scale(1.1); }

        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.1rem; margin-bottom: 12px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-body p { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-link { color: var(--primary); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; text-decoration: none; }

        footer { background: #000; padding: 50px 5%; text-align: center; border-top: 1px solid #333; }
        .social { margin: 20px 0; font-size: 1.5rem; }
        .social a { color: #fff; margin: 0 15px; transition: 0.3s; }
        .social a:hover { color: var(--primary); }

        @media (max-width: 768px) {
            header { flex-direction: column; background: #000; padding: 15px; position: relative; }
            .hero h2 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Q'SHOW</h1>
            <span>Entertainment News</span>
        </div>
        <div class="player-container">
            <span style="font-size: 0.6rem; font-weight: bold;"><i class="fas fa-broadcast-tower"></i> NO AR</span>
            <audio controls><source src="https://hts09.brascast.com:7988/live" type="audio/mpeg"></audio>
        </div>
    </header>

    <section class="hero">
        <p>Q'SHOW – Uma Festa Todo Dia!</p>
        <h2>As principais notícias de entretenimento de 2026.</h2>
    </section>

    <div class="container">
        <h2 class="section-title"><i class="fas fa-music"></i> Cultura & Música</h2>
        <div id="feed-cultura" class="news-grid">Carregando...</div>

        <h2 class="section-title"><i class="fas fa-trophy"></i> Esportes</h2>
        <div id="feed-esportes" class="news-grid">Carregando...</div>

        <h2 class="section-title"><i class="fas fa-star"></i> Variedades</h2>
        <div id="feed-geral" class="news-grid">Carregando...</div>
    </div>

    <footer>
        <h1>Q'SHOW</h1>
        <div class="social">
            <a href="https://www.instagram.com/qshowweb"><i class="fab fa-instagram"></i></a>
            <a href="https://m.youtube.com/@qshowweb"><i class="fab fa-youtube"></i></a>
        </div>
        <p>contato@qshow.com.br</p>
        <p style="font-size: 0.7rem; color: #555; margin-top: 15px;">Fonte: Agência Brasil (EBC) | 2026</p>
    </footer>

    <script>
        const CATEGORIAS = {
            cultura: { rss: 'https://agenciabrasil.ebc.com.br/rss/cultura/feed.xml', img: 'https://images.unsplash.com/photo-1514525253344-f814d074e015?w=500' },
            esportes: { rss: 'https://agenciabrasil.ebc.com.br/rss/esportes/feed.xml', img: 'https://images.unsplash.com/photo-1504450758481-7338eba7524a?w=500' },
            geral: { rss: 'https://agenciabrasil.ebc.com.br/rss/geral/feed.xml', img: 'https://images.unsplash.com/photo-1499336315816-097655dcfbda?w=500' }
        };

        async function carregarNoticias(cat, elementId) {
            const apiURL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(CATEGORIAS[cat].rss)}`;
            
            try {
                const response = await fetch(apiURL);
                const data = await response.json();
                const container = document.getElementById(elementId);
                container.innerHTML = '';

                data.items.slice(0, 3).forEach(item => {
                    // Tenta achar imagem no feed, senão usa a padrão da categoria
                    let imagem = item.enclosure.link || item.thumbnail || CATEGORIAS[cat].img;
                    
                    // Limpeza rápida da descrição
                    let texto = item.description.replace(/<[^>]*>?/gm, '').substring(0, 120) + '...';

                    container.innerHTML += `
                        <div class="news-card" onclick="window.open('${item.link}', '_blank')">
                            <div class="img-box"><img src="${imagem}" alt="Notícia"></div>
                            <div class="card-body">
                                <h3>${item.title}</h3>
                                <p>${texto}</p>
                                <span class="btn-link">Ver mais</span>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById(elementId).innerHTML = "Notícias em atualização...";
            }
        }

        window.onload = () => {
            carregarNoticias('cultura', 'feed-cultura');
            carregarNoticias('esportes', 'feed-esportes');
            carregarNoticias('geral', 'feed-geral');
        };
    </script>
</body>
</html>
