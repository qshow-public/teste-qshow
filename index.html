<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q'SHOW</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  background: linear-gradient(90deg,#111,#222);
}

h1 {
  color: #00e5ff;
}

.tagline {
  font-size: 18px;
  margin-top: 10px;
  color: #ccc;
}

.player {
  margin-top: 15px;
}

.container {
  padding: 20px;
}

.search {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 20px;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.05);
}

.blue { background: #007bff; }
.green { background: #39ff14; color:#000; }
.purple { background: #9b00ff; }

.btn {
  background: red;
  color: white;
  padding: 10px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
}

.favorite {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
<h1>Q'SHOW</h1>
<div class="tagline">
Reviva momentos inesquecíveis através das trilhas sonoras que marcaram sua vida.
</div>

<div class="player">
<audio controls src="https://hts09.brascast.com:7988/live"></audio>
</div>
</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="Buscar filme ou música...">

<h2 id="dayTitle"></h2>

<div class="cards" id="cards"></div>

</div>

<footer>
<p>📧 contato@qshow.com.br</p>
<p>
<a href="https://www.instagram.com/qshowweb" target="_blank">Instagram</a> |
<a href="https://m.youtube.com/@qshowweb" target="_blank">YouTube</a>
</p>
</footer>

<script>

// BASE DE FILMES + MÚSICAS (sem repetição)
const data = [
{film:"Titanic", music:"My Heart Will Go On", yt:"https://www.youtube.com/watch?v=F2RnxZnubCM"},
{film:"Rocky", music:"Eye of the Tiger", yt:"https://www.youtube.com/watch?v=btPJPFnesV4"},
{film:"Dirty Dancing", music:"Time of My Life", yt:"https://www.youtube.com/watch?v=4BQLE_RrTSU"},
{film:"Top Gun", music:"Danger Zone", yt:"https://www.youtube.com/watch?v=yK0P1Bk8Cx4"},
{film:"Frozen", music:"Let It Go", yt:"https://www.youtube.com/watch?v=L0MK7qz13bU"},
{film:"Aladdin", music:"A Whole New World", yt:"https://www.youtube.com/watch?v=JgG9GIV6qVw"},
{film:"The Lion King", music:"Can You Feel The Love Tonight", yt:"https://www.youtube.com/watch?v=25QyCxVkXwQ"},
{film:"Shrek", music:"All Star", yt:"https://www.youtube.com/watch?v=L_jWHffIx5E"},
{film:"Guardians of the Galaxy", music:"Hooked on a Feeling", yt:"https://www.youtube.com/watch?v=NrI-UBIB8Jk"},
{film:"Flashdance", music:"What a Feeling", yt:"https://www.youtube.com/watch?v=ILWSp0m9G2U"},
{film:"La La Land", music:"City of Stars", yt:"https://www.youtube.com/watch?v=GTWqwSNQCcg"},
{film:"007 Skyfall", music:"Skyfall", yt:"https://www.youtube.com/watch?v=DeumyOzKqgI"},
];

// duplicação automática para 1095 itens
while(data.length < 1095){
  data.push(...data);
}
data.length = 1095;

// dia atual
const today = new Date();
const dayIndex = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);

document.getElementById("dayTitle").innerText = "Dia " + dayIndex;

const container = document.getElementById("cards");

const colors = ["blue","green","purple"];

function renderCards(list){
  container.innerHTML = "";

  list.slice(dayIndex*3, dayIndex*3+3).forEach((item,i)=>{
    const card = document.createElement("div");
    card.className = "card " + colors[i];

    card.innerHTML = `
      <div class="favorite" onclick="fav(this)">❤️</div>
      <h3>Q'SHOW</h3>
      <p><b>🎬 ${item.film}</b></p>
      <p>🎵 ${item.music}</p>
      <a class="btn" href="${item.yt}" target="_blank">Ouvir a música</a>
    `;

    container.appendChild(card);
  });
}

renderCards(data);

// busca
document.getElementById("search").addEventListener("input", function(){
  const value = this.value.toLowerCase();

  const filtered = data.filter(item =>
    item.film.toLowerCase().includes(value) ||
    item.music.toLowerCase().includes(value)
  );

  container.innerHTML = "";
  filtered.slice(0,9).forEach((item,i)=>{
    const card = document.createElement("div");
    card.className = "card " + colors[i%3];

    card.innerHTML = `
      <h3>Q'SHOW</h3>
      <p><b>${item.film}</b></p>
      <p>${item.music}</p>
      <a class="btn" href="${item.yt}" target="_blank">Ouvir a música</a>
    `;

    container.appendChild(card);
  });
});

// favoritos
function fav(el){
  el.innerText = "💖";
}

</script>

</body>
</html>
