<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q'SHOW Receitas Fitness PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{padding:20px;text-align:center;background:linear-gradient(135deg,#22c55e,#16a34a)}
h1{margin:0}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:#1e293b;border-radius:16px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
.card img{width:100%;height:180px;object-fit:cover}
.card-content{padding:15px}
.card h3{margin:0 0 10px}
.info{font-size:13px;color:#cbd5f5}
.btn{display:block;margin-top:10px;padding:10px;text-align:center;background:#ef4444;color:#fff;border-radius:8px;text-decoration:none}
.btn.secondary{background:#22c55e}
.top-bar{display:flex;gap:10px;margin-bottom:15px}
input{flex:1;padding:10px;border-radius:8px;border:none}
.stats{margin:10px 0;font-size:14px}
</style>
</head>
<body>

<header>
<h1>Q'SHOW Fitness</h1>
<p>365 dias • 1.095 receitas • Sua vida mais leve</p>
</header>

<div class="container">

<div class="top-bar">
<input type="text" id="search" placeholder="Buscar receitas...">
<button onclick="logout()" class="btn">Sair</button>
</div>

<div class="stats">
🔥 Calorias hoje: <span id="calories">0</span> kcal |
❤️ Favoritos: <span id="favCount">0</span>
</div>

<div class="grid" id="recipes"></div>

</div>

<script>
// ===== USUÁRIO =====
let user = localStorage.getItem("user");
if(!user){
  user = prompt("Digite seu nome:");
  localStorage.setItem("user",user);
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// ===== BANCO DE DADOS LOCAL =====
let recipes = [];
let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");
let calories = 0;

// ===== GERAR 1095 RECEITAS =====
function generateRecipes(){
  const countries=["Brasil","EUA","Japão","Itália","França"];
  const categories=["Low Carb","Proteico","Vegano","Sem Lactose"];

  for(let i=0;i<1095;i++){
    recipes.push({
      id:i,
      name:`Receita Fitness ${i+1}`,
      time:Math.floor(Math.random()*30)+10+" min",
      calories:Math.floor(Math.random()*300)+100,
      category:categories[i%4],
      country:countries[i%5],
      image:`https://source.unsplash.com/400x300/?healthy-food,${i}`,
      youtube:"https://www.youtube.com/results?search_query=receita+fitness"
    });
  }
}

// ===== SISTEMA DE DATA =====
function getTodayRecipes(){
  const day = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const start = day*3 % recipes.length;
  return recipes.slice(start,start+3);
}

// ===== RENDER =====
function render(list){
  const container=document.getElementById("recipes");
  container.innerHTML="";

  list.forEach(r=>{
    container.innerHTML+=`
    <div class="card">
      <img src="${r.image}">
      <div class="card-content">
        <h3>${r.name}</h3>
        <div class="info">🌍 ${r.country} | 🥦 ${r.category}</div>
        <div class="info">⏱️ ${r.time} | 🔥 ${r.calories} kcal</div>
        <a href="${r.youtube}" target="_blank" class="btn">▶️ Assistir</a>
        <button onclick="addCalories(${r.calories})" class="btn secondary">+ Calorias</button>
        <button onclick="toggleFav(${r.id})" class="btn">❤️ Favoritar</button>
      </div>
    </div>`;
  });
}

// ===== FAVORITOS =====
function toggleFav(id){
  if(favorites.includes(id)){
    favorites=favorites.filter(f=>f!==id);
  }else{
    favorites.push(id);
  }
  localStorage.setItem("favorites",JSON.stringify(favorites));
  updateStats();
}

// ===== CALORIAS =====
function addCalories(c){
  calories+=c;
  document.getElementById("calories").innerText=calories;
}

function updateStats(){
  document.getElementById("favCount").innerText=favorites.length;
}

// ===== BUSCA =====
document.getElementById("search").addEventListener("input",function(){
  const val=this.value.toLowerCase();
  const filtered=recipes.filter(r=>r.name.toLowerCase().includes(val));
  render(filtered);
});

// INIT
generateRecipes();
render(getTodayRecipes());
updateStats();

</script>

</body>
</html>
