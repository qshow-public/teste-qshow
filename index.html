<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News - 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #E50914;
            --bg-dark: #000000;
            --card-bg: #181818;
            --text-light: #ffffff;
            --text-gray: #a3a3a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header Estilo Streaming */
        header {
            background-color: rgba(0,0,0,0.8);
            padding: 15px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .brand h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .brand p { font-size: 0.7rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* Player flutuante */
        .radio-player {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 5px 15px;
            border-radius: 30px;
        }

        /* Layout de Cards */
        .main-content { padding: 100px 5% 50px; }

        .category-row { margin-bottom: 40px; }
        .category-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title i { color: var(--primary); }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 5px;
            transition: transform 0.3s;
            cursor: pointer;
            overflow: hidden;
            border-bottom: 3px solid transparent;
        }

        .card:hover {
            transform: scale(1.05);
            border-bottom: 3px solid var(--primary);
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: #333;
            object-fit: cover;
        }

        .card-body { padding: 15px; }
        .card-body h3 { font-size: 1rem; margin-bottom: 10px; color: #fff; }
        .card-body p { font-size: 0.85rem; color: var(--text-gray); height: 60px; overflow: hidden; }

        footer {
            padding: 40px 5%;
            background: #111;
            text-align: center;
            border-top: 1px solid #333;
        }

        .loading-text { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <h1>Q'SHOW</h1>
            <p>Entertainment News</p>
        </div>
        <div class="radio-player">
            <span style="font-size: 0.7rem;"><i class="fas fa-circle" style="color:red"></i> AO VIVO</span>
            <audio controls style="height: 25px; width: 120px;">
                <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
            </audio>
        </div>
    </header>

    <div class="main-content">
        <div class="category-row">
            <div class="category-title"><i class="fas fa-music"></i> Música & Cultura</div>
            <div id="feed-musica" class="news-grid"><p class="loading-text">Atualizando notícias...</p></div>
        </div>

        <div class="category-row">
            <div class="category-title"><i class="fas fa-trophy"></i> Esportes</div>
            <div id="feed-esporte" class="news-grid"><p class="loading-text">Buscando resultados...</p></div>
        </div>

        <div class="category-row">
            <div class="category-title"><i class="fas fa-tv"></i> TV & Entretenimento</div>
            <div id="feed-tv" class="news-grid"><p class="loading-text">Carregando bastidores...</p></div>
        </div>
    </div>

    <footer>
        <p>Q'SHOW – Uma Festa Todo Dia!</p>
        <p style="font-size: 0.8rem; color: #666;">Notícias via Agência Brasil | © 2026</p>
    </footer>

    <script>
        // URLs da Agência Brasil (Público e Gratuito)
        const feeds = {
            musica: 'https://agenciabrasil.ebc.com.br/rss/cultura/feed.xml',
            esporte: 'https://agenciabrasil.ebc.com.br/rss/esportes/feed.xml',
            tv: 'https://agenciabrasil.ebc.com.br/rss/geral/feed.xml' // Usado para entretenimento geral
        };

        async function loadNews(category, elementId) {
            // Usando um serviço de proxy aberto para evitar problemas de CORS
            const proxy = 'https://api.rss2json.com/v1/api.json?rss_url=';
            
            try {
                const response = await fetch(proxy + encodeURIComponent(feeds[category]));
                const data = await response.json();
                const container = document.getElementById(elementId);
                container.innerHTML = '';

                // Pega os 3 primeiros itens
                data.items.slice(0, 3).forEach(item => {
                    // Tenta pegar imagem, se não tiver, usa um placeholder moderno
                    const img = item.thumbnail || 'https://images.unsplash.com/photo-1506157786151-b8491531f063?q=80&w=500';
                    
                    const card = `
                        <div class="card" onclick="window.open('${item.link}', '_blank')">
                            <img src="${img}" class="card-img" alt="QSHOW News">
                            <div class="card-body">
                                <h3>${item.title}</h3>
                                <p>${item.description.substring(0, 100).replace(/<[^>]*>?/gm, '')}...</p>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (e) {
                document.getElementById(elementId).innerHTML = "<p>Conteúdo em atualização para 2026...</p>";
            }
        }

        // Carrega tudo ao iniciar
        window.onload = () => {
            loadNews('musica', 'feed-musica');
            loadNews('esporte', 'feed-esporte');
            loadNews('tv', 'feed-tv');
        };
    </script>
</body>
</html>
