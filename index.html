<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW - Trilhas Sonoras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --q-blue: #007bff;
            --q-lime: #ccff00;
            --q-purple: #8a2be2;
            --q-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--q-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #000, transparent);
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 10px;
            color: white;
        }

        .hero-text {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .live-player-container {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-dot {
            width: 10px; height: 10px; background: #ff0000; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
        }

        .date-header {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--q-lime);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            height: 480px;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .card-blue { background: linear-gradient(135deg, #003366, var(--q-blue)); }
        .card-lime { background: linear-gradient(135deg, #668800, var(--q-lime)); color: #000; }
        .card-purple { background: linear-gradient(135deg, #440066, var(--q-purple)); }

        .watermark {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; font-weight: 900; opacity: 0.08; pointer-events: none;
        }

        .card-info h2 { font-size: 2rem; font-weight: 900; margin-bottom: 5px; line-height: 1; }
        .card-info p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 25px; }

        .btn-play {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
            text-align: center;
        }

        .btn-play:hover { background: #cc0000; box-shadow: 0 10px 20px rgba(255,0,0,0.4); }

        /* Modal Player */
        #modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content { position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; }

        .close-modal {
            position: absolute; top: -50px; right: 0;
            color: white; font-size: 2rem; cursor: pointer; background: none; border: none;
        }

        footer { padding: 50px 20px; text-align: center; font-size: 0.8rem; opacity: 0.6; }
        .social { margin-bottom: 20px; }
        .social a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .social a:hover { color: var(--q-lime); }

        @media (max-width: 768px) {
            .logo { font-size: 2.5rem; }
            .card { height: 400px; padding: 25px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Q'SHOW</div>
    <p class="hero-text">"Reviva momentos inesquecíveis através das trilhas sonoras que marcaram sua vida."</p>
    
    <div class="live-player-container">
        <div class="status-dot"></div>
        <span style="font-size: 0.8rem; font-weight: bold;">RÁDIO AO VIVO</span>
        <audio id="radio-player" src="https://hts09.brascast.com:7988/live" controls style="height: 30px;"></audio>
    </div>
</header>

<div class="container">
    <div class="date-header" id="current-date">-- de -- de ----</div>
    <div class="grid" id="card-grid">
        </div>
</div>

<footer>
    <div class="social">
        <a href="https://www.instagram.com/qshowweb">INSTAGRAM</a>
        <a href="https://m.youtube.com/@qshowweb">YOUTUBE</a>
        <a href="mailto:contato@qshow.com.br">CONTATO</a>
    </div>
    <p>© 2024 Q'SHOW - CONEXÃO EMOCIONAL E MÚSICA</p>
</footer>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="closeModal()">✕ FECHAR</button>
        <div id="video-wrapper"></div>
    </div>
</div>

<script>
    // Playlist oficial - Estrutura rigorosa para 3 cards/dia
    // IDs do YouTube testados para permitir incorporação
    const playlist = [
        [
            { movie: "O Rei Leão", song: "Circle of Life", yt: "GibiNy4d4gc" },
            { movie: "Titanic", song: "My Heart Will Go On", yt: "F2RnxZnubEc" },
            { movie: "Gladiador", song: "Now We Are Free", yt: "NBE-uBgtINg" }
        ],
        [
            { movie: "Interstellar", song: "First Step", yt: "IDsCtDRV2uA" },
            { movie: "Pulp Fiction", song: "Misirlou", yt: "mXonZ99PZpE" },
            { movie: "Rocky", song: "Gonna Fly Now", yt: "ioE_O7Lm0I4" }
        ],
        [
            { movie: "Nasce Uma Estrela", song: "Shallow", yt: "bo_efYhYU2A" },
            { movie: "De Volta para o Futuro", song: "The Power of Love", yt: "wDaJqWUPFzM" },
            { movie: "Top Gun", song: "Danger Zone", yt: "siwpn14IE7E" }
        ]
        // O sistema repetirá estes dias em loop ou você pode completar os 365.
    ];

    function init() {
        const grid = document.getElementById('card-grid');
        const dateEl = document.getElementById('current-date');
        const now = new Date();
        
        // Exibe data atual
        dateEl.innerText = now.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });

        // Seleção do dia (Lógica baseada no dia do ano)
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
        const dayData = playlist[(dayOfYear - 1) % playlist.length];

        const colors = ['card-blue', 'card-lime', 'card-purple'];

        grid.innerHTML = dayData.map((item, index) => `
            <div class="card ${colors[index]}">
                <div class="watermark">Q'SHOW</div>
                <div class="card-info">
                    <h2>${item.movie}</h2>
                    <p>${item.song}</p>
                    <button class="btn-play" onclick="openPlayer('${item.yt}')">Ouvir a música</button>
                </div>
            </div>
        `).join('');
    }

    function openPlayer(videoId) {
        // Pausa a rádio se estiver tocando para não sobrepor o som
        document.getElementById('radio-player').pause();
        
        const modal = document.getElementById('modal');
        const wrapper = document.getElementById('video-wrapper');
        
        // Parâmetros cruciais: origin para segurança e rel=0 para não mostrar recomendados
        wrapper.innerHTML = `<iframe width="100%" height="100%" 
            src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>`;
        
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('video-wrapper').innerHTML = '';
    }

    // Inicializa o site
    window.onload = init;
</script>

</body>
</html>
